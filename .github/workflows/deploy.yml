name: Deploy website to sands-lab/nika Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -R css js assets _site/
      # Publishes to the gh-pages branch of sands-lab/nika, which serves
      # https://sands-lab.github.io/nika/. NIKA_DEPLOY_TOKEN is a fine-grained
      # PAT with contents:write on sands-lab/nika, stored as a repo secret here.
      - name: Deploy to sands-lab/nika gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.NIKA_DEPLOY_TOKEN }}
          external_repository: sands-lab/nika
          publish_branch: gh-pages
          publish_dir: ./_site
